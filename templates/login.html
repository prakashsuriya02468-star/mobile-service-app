<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – MobileService</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
</head>
<body class="login-body">

  <div class="login-wrapper">
    <div class="login-card">

      <div class="login-brand">
        <div class="brand-icon">🔧</div>
        <h1>MobileService</h1>
        <p>Admin Portal</p>
      </div>

      {% if error %}
        <div class="alert alert-error">⚠ {{ error }}</div>
      {% endif %}

      <form method="POST" action="/">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username"
                 placeholder="Enter admin username" required autocomplete="off"/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password"
                 placeholder="Enter password" required/>
        </div>
        <button type="submit" class="btn-primary btn-full">Login to Dashboard</button>
      </form>

      <div class="login-footer">
        <a href="/track" class="track-link">🔍 Track an Order (Customer)</a>
      </div>
    </div>
  </div>

</body>
</html>
